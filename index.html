<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>山海行 · Shanhai Walker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-content">
        <h1 class="loading-title">山海行</h1>
        <p class="loading-subtitle">山海经 · 开放世界</p>
        <div class="loading-bar">
          <div class="loading-fill"></div>
        </div>
        <div class="loading-meta">
          <span class="loading-status">正在进入山海世界…</span>
          <span class="loading-percent">0%</span>
        </div>
      </div>
    </div>

    <div id="ui">
      <header id="hud-top">
        <div class="panel">
          <h1>山海行</h1>
          <p class="subtitle">海岛地形引擎</p>
        </div>
      </header>
      <div id="mode-badge" class="mode-badge"></div>
      <div id="island-panel" class="island-panel panel"></div>
      <div id="editor-panel" class="editor-panel panel">
        <h2>地形编辑</h2>
        <p class="editor-row"><span>左键拖拽</span> 升高</p>
        <p class="editor-row"><span>右键拖拽</span> 降低</p>
        <p class="editor-row">笔刷大小 <b id="editor-brush">14</b> <span class="editor-hint">[ ]</span></p>
        <p class="editor-row">力度 <b id="editor-strength">10</b>
          <button id="editor-strength-down" class="editor-btn">−</button>
          <button id="editor-strength-up" class="editor-btn">+</button>
        </p>
        <div class="editor-actions">
          <button id="editor-export" class="editor-btn wide">复制世界 JSON</button>
          <button id="editor-reset" class="editor-btn wide">重置地形</button>
        </div>
        <p class="editor-foot">按 <kbd>T</kbd> 退出编辑</p>
      </div>
      <footer id="hud-bottom">
        <div class="panel controls-panel">
          <div class="controls">
            <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动</span>
            <span><kbd>Space</kbd> 跳跃 / 滑翔</span>
            <span><kbd>Shift</kbd> 奔跑</span>
            <span><kbd>E</kbd> 攀爬</span>
            <span><kbd>F</kbd> 飞行</span>
            <span><kbd>Ctrl</kbd> 下降</span>
            <span><kbd>G</kbd> 网格</span>
            <span><kbd>M</kbd> 地图</span>
            <span><kbd>T</kbd> 地形编辑</span>
            <span><kbd>P</kbd> 岛屿参数</span>
          </div>
          <p class="hint">P 岛屿参数 · 实时更新地形 · T 手动画笔</p>
        </div>
      </footer>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
